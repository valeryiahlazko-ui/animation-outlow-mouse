
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.wrap {
  padding: 1.5rem 0 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.device {
  width: 320px;
  height: 240px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  border: 0.5px solid var(--border-strong);
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease-in-out;
}

.screen-welcome {
  background: radial-gradient(ellipse at 50% 30%, #2a1a0a, #0d0804);
  opacity: 1;
  gap: 10px;
}
.welcome-star  { font-size: 10px; color: #c8922a; letter-spacing: 6px; }
.welcome-title { font-size: 20px; font-weight: 700; color: #e8b84b; letter-spacing: 2px; }
.welcome-sub   { font-size: 9px; color: #8a6a3a; letter-spacing: 4px; text-transform: uppercase; }
.welcome-icon  { font-size: 34px; margin: 2px 0; }
.welcome-btn {
  margin-top: 6px;
  padding: 8px 28px;
  background: #8a3a10;
  border-radius: 4px;
  font-size: 12px;
  color: #e8c870;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid #c86030;
  font-weight: 600;
}
.welcome-btn:hover { background: #a04a18; }

.screen-slot {
  background: radial-gradient(ellipse at 50% 20%, #1e0e04, #0a0502);
  opacity: 0;
  pointer-events: none;
  gap: 0;
}

.slot-header {
  font-size: 9px; color: #8a6a2a;
  letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 8px;
}
.slot-machine {
  background: #1a0e06;
  border: 2px solid #6a4010;
  border-radius: 8px;
  padding: 10px 12px 12px;
  box-shadow: inset 0 2px 8px #00000088;
}
.reels { display: flex; gap: 6px; margin-bottom: 8px; }
.reel {
  width: 52px; height: 52px;
  background: #0d0602;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  border: 1px solid #3a2010;
}
.payline {
  height: 2px;
  background: linear-gradient(90deg, transparent, #c8922a, transparent);
  margin-bottom: 8px;
}
.spin-btn {
  width: 100%; padding: 8px;
  background: #6a2008;
  border: 1px solid #c84020;
  border-radius: 4px;
  font-size: 11px; font-weight: 700;
  color: #e8c870; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer;
}
.spin-btn:hover  { background: #802808; }
.spin-btn:active { opacity: 0.8; }

.back-link {
  margin-top: 10px; font-size: 10px;
  color: #5a4020; cursor: pointer; letter-spacing: 1px;
}
.back-link:hover { color: #8a6030; }

/* Entrance */
@keyframes springIn   { 0% { opacity:0; transform:scale(0.6) } 60% { opacity:1; transform:scale(1.06) } 80% { transform:scale(0.97) } 100% { opacity:1; transform:scale(1) } }
@keyframes springUp   { 0% { opacity:0; transform:translateY(-12px) } 60% { opacity:1; transform:translateY(3px) } 100% { opacity:1; transform:translateY(0) } }
@keyframes springReel { 0% { opacity:0; transform:translateY(18px) scale(0.8) } 55% { opacity:1; transform:translateY(-4px) scale(1.05) } 80% { transform:translateY(2px) scale(0.98) } 100% { opacity:1; transform:scale(1) } }
@keyframes fadeSlide  { 0% { opacity:0; transform:scale(0.9) } 100% { opacity:1; transform:scale(1) } }
@keyframes fadeIn     { 0% { opacity:0 } 100% { opacity:1 } }

/* Shake — только transform, opacity не трогаем */
@keyframes shakeSoft {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  15%      { transform: translate(-3px, 1px) rotate(-0.3deg); }
  30%      { transform: translate(3px, -1px) rotate(0.3deg); }
  45%      { transform: translate(-2px, 1px) rotate(-0.2deg); }
  60%      { transform: translate(2px, 0px)  rotate(0.2deg); }
  75%      { transform: translate(-1px, 0px) rotate(-0.1deg); }
  90%      { transform: translate(1px, 0px); }
}
@keyframes shakeNormal {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  10%      { transform: translate(-6px, 2px) rotate(-0.6deg); }
  20%      { transform: translate(6px, -2px) rotate(0.6deg); }
  30%      { transform: translate(-5px, 1px) rotate(-0.5deg); }
  40%      { transform: translate(5px, -1px) rotate(0.5deg); }
  50%      { transform: translate(-3px, 1px) rotate(-0.3deg); }
  60%      { transform: translate(3px, -1px) rotate(0.3deg); }
  70%      { transform: translate(-2px, 0px) rotate(-0.2deg); }
  80%      { transform: translate(2px, 0px)  rotate(0.1deg); }
  90%      { transform: translate(-1px, 0px); }
}
@keyframes shakeHard {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  8%       { transform: translate(-9px, 3px) rotate(-1deg); }
  16%      { transform: translate(9px, -3px) rotate(1deg); }
  24%      { transform: translate(-7px, 2px) rotate(-0.8deg); }
  32%      { transform: translate(7px, -2px) rotate(0.8deg); }
  40%      { transform: translate(-5px, 1px) rotate(-0.5deg); }
  50%      { transform: translate(5px, -1px) rotate(0.5deg); }
  60%      { transform: translate(-3px, 1px) rotate(-0.3deg); }
  70%      { transform: translate(3px, 0px)  rotate(0.2deg); }
  80%      { transform: translate(-2px, 0px); }
  90%      { transform: translate(1px, 0px); }
}

@keyframes reelRoll {
  0%   { transform: translateY(0);    filter: blur(0); }
  25%  { transform: translateY(-5px); filter: blur(2px); }
  50%  { transform: translateY(0);    filter: blur(3px); }
  75%  { transform: translateY(4px);  filter: blur(1px); }
  100% { transform: translateY(0);    filter: blur(0); }
}

/* Controls */
.controls {
  display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap; justify-content: center;
}
.dur-label { font-size: 12px; color: var(--text-muted); }
select {
  background: var(--surface-1);
  border: 0.5px solid var(--border-strong);
  color: var(--text-primary);
  border-radius: 6px; padding: 5px 8px; font-size: 12px;
}
.badge {
  display: flex; gap: 6px;
  font-size: 11px; color: var(--text-muted); align-items: center;
}
.badge span {
  background: var(--surface-1);
  border: 0.5px solid var(--border);
  border-radius: 4px; padding: 3px 8px;
  font-family: monospace; color: var(--text-accent);
}
</style>

<div class="wrap">
  <div class="device">
    <div class="screen screen-welcome" id="welcome">
      <div class="welcome-star">★ ★ ★</div>
      <div class="welcome-icon">🤠</div>
      <div class="welcome-title">WILD WEST</div>
      <div class="welcome-sub">Slots</div>
      <button class="welcome-btn" id="play-btn">Play now</button>
    </div>

    <div class="screen screen-slot" id="slot">
      <div class="slot-header" id="el-header" style="opacity:0">Wild West Slots</div>
      <div class="slot-machine" id="el-machine" style="opacity:0">
        <div class="reels">
          <div class="reel" id="r1" style="opacity:0">🤠</div>
          <div class="reel" id="r2" style="opacity:0">⭐</div>
          <div class="reel" id="r3" style="opacity:0">🌵</div>
        </div>
        <div class="payline" id="el-payline" style="opacity:0"></div>
        <button class="spin-btn" id="el-spin" style="opacity:0">S P I N</button>
      </div>
      <div class="back-link" id="back-btn" style="opacity:0">← Welcome</div>
    </div>
  </div>

  <div class="controls">
    <span class="dur-label">Дрожание</span>
    <select id="intensity">
      <option value="soft">Мягкое</option>
      <option value="normal" selected>Нормальное</option>
      <option value="hard">Сильное</option>
    </select>
  </div>

  <div class="badge">
    <span>shake on spin</span>
    <span id="dur-badge">normal</span>
  </div>
</div>

<script>
const welcome    = document.getElementById('welcome');
const slot       = document.getElementById('slot');
const playBtn    = document.getElementById('play-btn');
const backBtn    = document.getElementById('back-btn');
const elHeader   = document.getElementById('el-header');
const elMachine  = document.getElementById('el-machine');
const r1 = document.getElementById('r1');
const r2 = document.getElementById('r2');
const r3 = document.getElementById('r3');
const elPayline  = document.getElementById('el-payline');
const elSpin     = document.getElementById('el-spin');
const durBadge   = document.getElementById('dur-badge');
const intensityEl = document.getElementById('intensity');

let isSlot = false, running = false, spinning = false;
const symbols = ['🤠','⭐','🌵','💰','🐴','🎰','🔫','🏆'];
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

intensityEl.addEventListener('change', () => { durBadge.textContent = intensityEl.value; });

// Фиксируем состояние элемента инлайн и убираем анимацию
function lockAndClear(el, opacity, transform) {
  el.style.opacity   = opacity;
  el.style.transform = transform;
  el.style.filter    = '';
  el.style.animation = 'none';
  void el.offsetWidth; // reflow
}

function setAnim(el, anim) {
  el.style.animation = anim;
}

function resetAll() {
  [elHeader, elMachine, r1, r2, r3, elPayline, elSpin, backBtn].forEach(el => {
    lockAndClear(el, '0', '');
  });
}

function animateIn() {
  const s = 80;
  function go(el, kf, dur, delay) {
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = `${kf} ${dur}ms cubic-bezier(.34,1.4,.64,1) ${delay}ms forwards`;
  }
  go(elHeader,  'springUp',   420,  0);
  go(elMachine, 'springIn',   600,  s);
  go(r1,        'springReel', 480,  s*3);
  go(r2,        'springReel', 480,  s*4.5);
  go(r3,        'springReel', 480,  s*6);
  go(elPayline, 'fadeIn',     300,  s*7);
  go(elSpin,    'fadeSlide',  360,  s*8);
  go(backBtn,   'fadeIn',     240,  s*10);
}

function goToSlot() {
  if (isSlot || running) return;
  running = true; isSlot = true;
  welcome.style.opacity = '0';
  welcome.style.pointerEvents = 'none';
  setTimeout(() => {
    slot.style.opacity = '1';
    slot.style.pointerEvents = 'auto';
    resetAll();
    void slot.offsetWidth;
    animateIn();
    running = false;
  }, 500);
}

function goToWelcome() {
  if (!isSlot || running) return;
  running = true; isSlot = false;
  slot.style.opacity = '0';
  slot.style.pointerEvents = 'none';
  setTimeout(() => {
    welcome.style.opacity = '1';
    welcome.style.pointerEvents = 'auto';
    resetAll();
    running = false;
  }, 500);
}

function doSpin() {
  if (spinning) return;
  spinning = true;

  const intensity = intensityEl.value;
  const dur  = { soft: 500, normal: 600, hard: 750 }[intensity];
  const name = { soft: 'shakeSoft', normal: 'shakeNormal', hard: 'shakeHard' }[intensity];

  // Фиксируем видимое состояние, потом запускаем shake
  lockAndClear(elMachine, '1', 'translate(0,0)');
  setAnim(elMachine, `${name} ${dur}ms ease-out forwards`);

  // Барабаны крутятся с задержкой
  [r1, r2, r3].forEach((r, i) => {
    lockAndClear(r, '1', 'translateY(0)');
    setAnim(r, `reelRoll ${dur * 0.75}ms ease-in-out ${i * 80}ms forwards`);
  });

  // Меняем символы на пике размытия
  setTimeout(() => {
    r1.textContent = rand(symbols);
    r2.textContent = rand(symbols);
    r3.textContent = rand(symbols);
  }, dur * 0.45);

  // После завершения — снимаем анимацию, фиксируем финальное состояние
  setTimeout(() => {
    lockAndClear(elMachine, '1', '');
    [r1, r2, r3].forEach(r => lockAndClear(r, '1', ''));
    spinning = false;
  }, dur + 120);
}

playBtn.addEventListener('click', goToSlot);
backBtn.addEventListener('click', goToWelcome);
elSpin.addEventListener('click', doSpin);
</script>
